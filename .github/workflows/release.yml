name: Build Desktop Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run dist

      - name: Publish release asset
        uses: ncipollo/release-action@v1
        with:
          tag: desktop-latest
          name: Buddy Desktop (Windows)
          body: "Automated build of the Buddy desktop installer."
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          prerelease: false
          artifacts: "dist/Buddy-Setup.exe"
          token: ${{ secrets.GITHUB_TOKEN }}
