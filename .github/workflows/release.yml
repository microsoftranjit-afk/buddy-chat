name: Build Desktop Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Electron / electron-builder binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: eb-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            eb-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run dist

      - name: Show build debug log on failure
        if: failure()
        run: |
          if (Test-Path electron-builder-debug.yml) { Get-Content electron-builder-debug.yml }
          if (Test-Path dist) { Get-ChildItem dist }

      - name: Publish release asset
        uses: ncipollo/release-action@v1
        with:
          tag: desktop-latest
          name: Buddy Desktop (Windows)
          body: "Automated build of the Buddy desktop installer."
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          prerelease: false
          artifacts: "dist/Buddy-Setup.exe,dist/latest.yml,dist/Buddy-Setup.exe.blockmap"
          token: ${{ secrets.GITHUB_TOKEN }}
