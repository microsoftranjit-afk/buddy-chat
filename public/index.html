<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buddy</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- SVG icon sprite -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <symbol id="icon-chat" viewBox="0 0 24 24"><path fill="currentColor" d="M4 4h16a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H9l-5 4V5a1 1 0 0 1 1-1z"/></symbol>
    <symbol id="icon-phone" viewBox="0 0 24 24"><path d="M6.5 3.5h3l1.5 4-2 1.5a12 12 0 0 0 5.5 5.5l1.5-2 4 1.5v3a2 2 0 0 1-2 2A16 16 0 0 1 4.5 5.5a2 2 0 0 1 2-2z"/></symbol>
    <symbol id="icon-phone-off" viewBox="0 0 24 24"><path d="M6.5 3.5h3l1.5 4-2 1.5a12 12 0 0 0 5.5 5.5l1.5-2 4 1.5v3a2 2 0 0 1-2 2A16 16 0 0 1 4.5 5.5a2 2 0 0 1 2-2z"/><line x1="3" y1="3" x2="21" y2="21"/></symbol>
    <symbol id="icon-mic" viewBox="0 0 24 24"><rect x="9" y="2.5" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="21"/></symbol>
    <symbol id="icon-mic-off" viewBox="0 0 24 24"><rect x="9" y="2.5" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="21"/><line x1="3" y1="3" x2="21" y2="21"/></symbol>
    <symbol id="icon-video" viewBox="0 0 24 24"><rect x="3" y="6" width="13" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3"/></symbol>
    <symbol id="icon-video-off" viewBox="0 0 24 24"><rect x="3" y="6" width="13" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3"/><line x1="3" y1="3" x2="21" y2="21"/></symbol>
    <symbol id="icon-send" viewBox="0 0 24 24"><path fill="currentColor" d="M3 11.5l18-8.5-8 18-2.3-7.2L3 11.5z"/></symbol>
    <symbol id="icon-gear" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.1"/><path d="M12 2.6v2.1M12 19.3v2.1M4.7 4.7l1.5 1.5M17.8 17.8l1.5 1.5M2.6 12h2.1M19.3 12h2.1M4.7 19.3l1.5-1.5M17.8 6.2l1.5-1.5"/></symbol>
    <symbol id="icon-link" viewBox="0 0 24 24"><path d="M9.5 14.5a3.5 3.5 0 0 0 5 0l3-3a3.5 3.5 0 0 0-5-5l-1.2 1.2"/><path d="M14.5 9.5a3.5 3.5 0 0 0-5 0l-3 3a3.5 3.5 0 0 0 5 5l1.2-1.2"/></symbol>
    <symbol id="icon-close" viewBox="0 0 24 24"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></symbol>
    <symbol id="icon-check" viewBox="0 0 24 24"><path d="M4 12.5l5 5 11-11"/></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/></symbol>
    <symbol id="icon-image" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="1.6"/><path d="M21 16l-5-5L5 20"/></symbol>
    <symbol id="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></symbol>
  </svg>

  <input type="file" id="picInput" accept="image/*" hidden />

  <!-- ===== Login ===== -->
  <div id="login" class="login">
    <div class="login-card">
      <div class="brand">
        <svg class="brand-logo"><use href="#icon-chat"/></svg>
        <h1>Buddy</h1>
        <p class="brand-sub">Private chat and calls with a friend</p>
      </div>
      <label class="field">
        <span>Your name</span>
        <input id="nameInput" type="text" placeholder="e.g. Alex" maxlength="32" autocomplete="off" />
      </label>
      <label class="field">
        <span>Room name</span>
        <input id="roomInput" type="text" placeholder="e.g. blue-moon-77" maxlength="80" autocomplete="off" />
        <small class="field-hint">Share this exact room name with your friend. Leave blank to just use Friends.</small>
      </label>
      <div id="loginError" class="login-error hidden"></div>
      <button id="joinBtn" class="primary-btn">Start chatting</button>
      <p class="login-foot">No account needed. Pick a name and a room.</p>
    </div>
  </div>

  <!-- ===== App ===== -->
  <div id="app" class="app hidden">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="brand-mark"><svg class="brand-logo"><use href="#icon-chat"/></svg></div>
        <div class="brand-name">Buddy</div>
      </div>

      <div class="side-scroll">
        <div id="friendsList" class="friends"></div>
        <div class="side-empty" id="friendsEmpty">No friends online yet. Share your room name.</div>
      </div>

      <div class="side-actions">
        <button id="inviteBtn" class="side-action">
          <svg class="icon"><use href="#icon-link"/></svg> Invite link
        </button>
      </div>

      <div class="me">
        <button id="meAvatarBtn" class="avatar-btn" title="Change photo">
          <div id="meAvatar" class="avatar">?</div>
        </button>
        <div class="me-info">
          <div id="meName" class="me-name">—</div>
          <div id="meBio" class="me-bio"></div>
          <div id="connState" class="conn">connecting</div>
        </div>
      </div>
    </aside>

    <!-- Conversation -->
    <main class="chat">
      <header class="chat-head">
        <div class="chat-title">
          <div id="peerAvatar" class="avatar small hidden"></div>
          <span class="hash" id="titleHash">#</span><span id="roomLabel">room</span>
          <span id="presence" class="presence"></span>
        </div>
        <div class="chat-actions">
          <button id="callBtn" class="btn call" title="Start a call">
            <svg class="icon"><use href="#icon-phone"/></svg><span>Call</span>
          </button>
          <button id="hangupBtn" class="btn hangup hidden" title="End call">
            <svg class="icon"><use href="#icon-phone-off"/></svg><span>End</span>
          </button>
          <button id="settingsOpen" class="icon-btn" title="Appearance & settings">
            <svg class="icon"><use href="#icon-gear"/></svg>
          </button>
        </div>
      </header>

      <div id="messages" class="messages"></div>

      <footer class="composer">
        <button id="mediaBtn" class="icon-btn" title="GIFs & stickers">
          <svg class="icon"><use href="#icon-image"/></svg>
        </button>
        <input id="msgInput" type="text" placeholder="Message" maxlength="4000" autocomplete="off" />
        <button id="sendBtn" class="btn primary" title="Send">
          <svg class="icon"><use href="#icon-send"/></svg>
        </button>
      </footer>

      <!-- Media picker -->
      <div id="mediaPanel" class="media-panel hidden">
        <div class="media-head">
          <div class="media-tabs">
            <button id="tabGif" class="active">GIF</button>
            <button id="tabSticker">Sticker</button>
          </div>
          <div class="media-search">
            <svg class="icon"><use href="#icon-search"/></svg>
            <input id="mediaSearch" type="text" placeholder="Search Klipy" />
          </div>
          <button id="mediaClose" class="icon-btn"><svg class="icon"><use href="#icon-close"/></svg></button>
        </div>
        <div id="mediaGrid" class="media-grid"></div>
        <div id="mediaStatus" class="media-status"></div>
      </div>
    </main>

    <!-- Settings drawer -->
    <aside id="settings" class="settings hidden">
      <div class="settings-head">
        <span>Settings</span>
        <button id="settingsClose" class="icon-btn"><svg class="icon"><use href="#icon-close"/></svg></button>
      </div>
      <div class="settings-body">
        <section class="set-section">
          <h3>Profile</h3>
          <div class="profile-edit">
            <button id="profilePicBtn" class="avatar-btn"><div id="profilePic" class="avatar">?</div></button>
            <div class="profile-fields">
              <input id="nameEdit" type="text" maxlength="32" placeholder="Display name" />
              <textarea id="bioEdit" maxlength="200" rows="2" placeholder="Bio"></textarea>
            </div>
          </div>
        </section>

        <section class="set-section">
          <h3>Devices</h3>
          <label class="field-inline"><span>Microphone</span>
            <select id="micSelect"><option value="">Default</option></select>
          </label>
          <label class="field-inline"><span>Speaker / Headset</span>
            <select id="speakerSelect"><option value="">Default</option></select>
          </label>
          <button id="deviceRefresh" class="reset-btn" style="margin-top:8px">Refresh devices</button>
        </section>

        <section class="set-section">
          <h3>Theme</h3>
          <div class="seg" id="themeSeg">
            <button data-theme="dark" class="active">Dark</button>
            <button data-theme="light">Light</button>
          </div>
        </section>

        <section class="set-section">
          <h3>Accent color</h3>
          <div class="dots" id="accentDots"></div>
          <label class="custom-color">Custom
            <input type="color" id="accentCustom" value="#3390ec" />
          </label>
        </section>

        <section class="set-section">
          <h3>Chat background</h3>
          <div class="bg-grid" id="bgGrid"></div>
        </section>

        <section class="set-section">
          <h3>Message style</h3>
          <label class="slider-row">
            <span>Bubble roundness</span><span id="radiusVal" class="slider-val">14px</span>
            <input type="range" id="radiusRange" min="0" max="24" value="14" />
          </label>
          <label class="slider-row">
            <span>Text size</span><span id="fontVal" class="slider-val">15px</span>
            <input type="range" id="fontRange" min="12" max="20" value="15" />
          </label>
        </section>

        <button id="resetSettings" class="reset-btn">Reset appearance</button>
      </div>
    </aside>

    <!-- Call overlay -->
    <div id="callOverlay" class="call-overlay hidden">
      <div class="call-stage">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
      </div>
      <div id="callStatus" class="call-status">Connecting</div>
      <div class="call-controls">
        <button id="toggleAudio" class="round" title="Mute"><svg class="icon"><use href="#icon-mic"/></svg></button>
        <button id="toggleVideo" class="round" title="Camera"><svg class="icon"><use href="#icon-video"/></svg></button>
        <button id="endCall" class="round hangup" title="End call"><svg class="icon"><use href="#icon-phone-off"/></svg></button>
      </div>
    </div>
  </div>

  <script src="vendor/socket.io.min.js"></script>
  <script src="client.js"></script>
</body>
</html>
